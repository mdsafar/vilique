name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      RAZORPAY_KEY_ID: rzp_test_ci
      RAZORPAY_KEY_SECRET: test_razorpay_secret
      RAZORPAY_WEBHOOK_SECRET: test_webhook_secret
      PAYMENT_RECONCILIATION_SECRET: test_cron_secret
      REQUEST_HASH_SECRET: test_request_hash_secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      PAYMENTS_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: test -f supabase/migrations/202607150005_payment_finalization_abuse_media_ops.sql
      - run: test -f supabase/migrations/202607150006_razorpay_webhook_claiming.sql
      - run: test -f supabase/migrations/202607150008_refunds_rate_limits_ops.sql
      - run: grep -R "claim_unrecoverable_publish_refund" supabase/migrations
      - run: grep -R "consume_rate_limit" supabase/migrations
      - run: "! grep -R \"\\[Legal entity name\\|\\[Registered business address\\|\\[Grievance officer\" app components"
      - run: npm run build
      - name: Dependency audit visibility
        run: npm audit --audit-level=high || echo "npm audit unavailable or reported non-high issues; review logs"
      - name: Outdated dependency visibility
        run: npm outdated || true
